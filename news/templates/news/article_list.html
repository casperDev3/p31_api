{% extends 'news/base.html' %}

{% block content %}
    <h1>Last news:</h1>
    {% for article in articles %}
        <div class="article">
            <h2><a href="{% url 'news-detail' article.id %}">{{ article.title }}</a></h2>
            <p>{{ article.content|truncatechars:100 }}</p>
            <p>Published at: {{ article.published_at }}</p>
        </div>
    {% empty %}
        <p>No articles available.</p>
    {% endfor %}

{% endblock %}
