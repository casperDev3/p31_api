<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NewsHub{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50:  '#faf5ff',
                            100: '#f3e8ff',
                            500: '#a855f7',
                            600: '#9333ea',
                            700: '#7e22ce',
                            900: '#581c87',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">

                <!-- Logo -->
                <a href="{% url 'landing' %}" class="flex items-center gap-2 group">
                    <div class="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center group-hover:bg-primary-700 transition-colors">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 12h6m-6-4h2"/>
                        </svg>
                    </div>
                    <span class="text-xl font-bold text-gray-900">News<span class="text-primary-600">Hub</span></span>
                </a>

                <!-- Nav -->
                <nav class="hidden md:flex items-center gap-6">
                    <a href="{% url 'landing' %}" class="text-sm font-medium text-gray-700 hover:text-primary-600 transition-colors">Головна</a>
                    <a href="/api/" class="text-sm font-medium text-gray-700 hover:text-primary-600 transition-colors">REST API</a>
                    <a href="/graphql/" class="text-sm font-medium text-gray-700 hover:text-primary-600 transition-colors">GraphQL</a>
                </nav>

                <!-- Admin button -->
                <div class="flex items-center gap-3">
                    <a href="/admin/" class="bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
                        Адмін-панель
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="bg-gray-900 text-gray-400 mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-7 h-7 bg-primary-600 rounded-md flex items-center justify-center">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 12h6m-6-4h2"/>
                        </svg>
                    </div>
                    <span class="text-white font-semibold">NewsHub</span>
                </div>
                <p class="text-sm">&copy; {% now "Y" %} NewsHub. Всі права захищені.</p>
                <div class="flex gap-4 text-sm">
                    <a href="/api/" class="hover:text-white transition-colors">REST API</a>
                    <a href="/graphql/" class="hover:text-white transition-colors">GraphQL</a>
                    <a href="/admin/" class="hover:text-white transition-colors">Адмін</a>
                </div>
            </div>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
